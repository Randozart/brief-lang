<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>shopping_cart</title>
    <link rel="stylesheet" href="shopping_cart.css">
</head>
<body>
<div class="app">
    <span class="header">
      <h1>Brief Store</h1>
      <span class="badge"><span id="rbv-span-0" b-text="items">0</span> items | $<span id="rbv-span-1" b-text="total">0</span></span>
    </span>
    <span id="rbv-span-2" class="shop" b-show="step == 0">
      <span class="left">
        <h2>Select a Product</h2>
        <span id="rbv-span-3" class="product" b-show="product == 1"><h3>Laptop $1,299</h3><p>Intel i9 32GB RTX 4090</p><button id="rbv-button-4" b-trigger:click="add">Add to Cart</button></span>
        <span id="rbv-span-5" class="product" b-show="product == 2"><h3>Keyboard $149</h3><p>RGB Cherry MX Aluminum</p><button id="rbv-button-6" b-trigger:click="add">Add to Cart</button></span>
        <span id="rbv-span-7" class="product" b-show="product == 3"><h3>Mouse $49</h3><p>16K DPI Wireless</p><button id="rbv-button-8" b-trigger:click="add">Add to Cart</button></span>
        <span id="rbv-span-9" class="product" b-show="product == 4"><h3>Monitor $399</h3><p>27 inch 144Hz HDR</p><button id="rbv-button-10" b-trigger:click="add">Add to Cart</button></span>
        <span id="rbv-span-11" class="product" b-show="product == 0"><p>Choose a product</p></span>
        <span class="buttons"><button id="rbv-button-12" b-trigger:click="select_laptop">Laptop</button><button id="rbv-button-13" b-trigger:click="select_keyboard">Keyboard</button><button id="rbv-button-14" b-trigger:click="select_mouse">Mouse</button><button id="rbv-button-15" b-trigger:click="select_monitor">Monitor</button></span>
      </span>
      <span class="right">
        <h2>Cart</h2>
        <span id="rbv-span-16" b-show="items == 0"><p>Empty</p></span>
        <span id="rbv-span-17" b-show="items > 0"><p>Items: <span id="rbv-span-18" b-text="items">0</span></p><p>Total: $<span id="rbv-span-19" b-text="total">0</span></p><button id="rbv-button-20" b-trigger:click="checkout">Checkout</button></span>
      </span>
    </span>
    <span id="rbv-span-21" class="checkout" b-show="step == 1">
      <h2>Checkout</h2>
      <p>Total: $<span id="rbv-span-22" b-text="total">0</span></p>
      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <input type="text" placeholder="Address">
      <input type="text" placeholder="Card">
      <span style="display: flex; gap: 10px;"><input type="text" placeholder="MM/YY" style="flex:1;"><input type="text" placeholder="CVV" style="flex:1;"></span>
      <button id="rbv-button-23" b-trigger:click="confirm">Pay</button>
      <button id="rbv-button-24" b-trigger:click="reset">Cancel</button>
    </span>
    <span id="rbv-span-25" class="confirmed" b-show="step == 2">
      <h2>Confirmed</h2>
      <p style="color: #4caf50; font-size: 48px; font-weight: 700;">SUCCESS</p>
      <p>Total: $<span id="rbv-span-26" b-text="total">0</span></p>
      <p>Items: <span id="rbv-span-27" b-text="items">0</span></p>
      <button id="rbv-button-28" b-trigger:click="reset">Shop Again</button>
    </span>
  </div>
    <script type="module" src="shopping_cart_glue.js"></script>
</body>
</html>
